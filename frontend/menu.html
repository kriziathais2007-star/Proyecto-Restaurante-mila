<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Milagros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>RESTAURANTE MILAGROS</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">RESTAURANTE MILI</div>
        <ul>
            <li>
                <a href="inicio.html" data-page="home">
                    <i class="fa-solid fa-house"></i><span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="pedidos.html" data-page="pedidos">
                    <i class="fa-solid fa-clipboard-list"></i><span>Pedidos</span>
                </a>
            </li>
            <li>
                <a href="cocina.html" data-page="cocina">
                    <i class="fa-solid fa-kitchen-set"></i><span>Cocina</span>
                </a>
            </li>
            <li>
                <a href="asistencia.html" data-page="asistencia">
                    <i class="fa-solid fa-user-check"></i><span>Asistencia</span>
                </a>
            </li>
            <li>
                <a href="menu.html" class="activo" data-page="menu">
                    <i class="fa-solid fa-pen-to-square"></i><span>Menú</span>
                </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Inicio</span>
        </nav>
        <div class="main-content">

        </div>
    </main>


    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
