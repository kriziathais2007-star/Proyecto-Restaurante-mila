<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Milagros</title>
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="title-business">
            <span>RESTAURANTE MILAGROS</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">RESTAURANTE MILI</div>
        <ul>
            <li><a href="inicio.html" data-page="home"><i class="fa-solid fa-house"></i><span>Inicio</span></a></li>
            <li><a href="pedidos.html" data-page="pedidos"><i class="fa-solid fa-clipboard-list"></i><span>Pedidos</span></a></li>
            <li><a href="cocina.html" data-page="cocina"><i class="fa-solid fa-kitchen-set"></i><span>Cocina</span></a></li>
            <li><a href="asistencia.html" data-page="asistencia"><i class="fa-solid fa-user-check"></i><span>Asistencia</span></a></li>
            <li><a href="menu.html" class="activo" data-page="menu"><i class="fa-solid fa-pen-to-square"></i><span>Menú</span></a></li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <nav class="breadcrumb">
            <span>Menú</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Inicio</span>
        </nav>
        <div class="menu-header">
            <h2 class="menu-title">
                <i class="fa-solid fa-book-open"></i>
                Carta del Menú
                <span class="badge-total" id="badge-total">0</span>
            </h2>
            <button class="btn-agregar-plato"
                    data-bs-toggle="modal" data-bs-target="#modalAgregarPlato">
                <i class="fa-solid fa-plus"></i> Agregar plato
            </button>
        </div>

        <div class="platos-grid" id="platos-grid"></div>

    </main>

    <!-- MODAL AGREGAR PLATO -->
    <div class="modal fade" id="modalAgregarPlato" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-plato">
                <div class="modal-plato-header">
                    <h5><i class="fa-solid fa-plus me-2"></i>Nuevo plato</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="field-label">Nombre del plato</label>
                        <input type="text" id="p_nombre" class="form-control" placeholder="Ej: Lomo Saltado">
                    </div>
                    <div class="mb-3">
                        <label class="field-label">Precio (S/.)</label>
                        <input type="number" id="p_precio" class="form-control" placeholder="Ej: 25.00" min="0" step="0.50">
                    </div>
                    <div class="mb-3">
                        <label class="field-label">Descripción</label>
                        <textarea id="p_descripcion" class="form-control" rows="3" placeholder="Describe el plato..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btn-guardarPlato" class="btn-guardar-plato">
                        </i> Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-wrap" id="toast-wrap"></div>

    <script src="js/sidebar.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
