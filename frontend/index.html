<!DOCTYPE html>
<html lang="Es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milagros - Sistema de Gestión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<!-- SIDEBAR MOBILE-CELULAR -->
<div class="topbar">
    <div class="title-business">
        <span>JUANITO SAC</span>
    </div>
    <div class="btn-menu">
        <button class="hamburger">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</div>
<!-- OVERLAY JUNTO CON EL NAVBAR-->
<div class="overlay"></div>
<!-- SIBERBAR DESKTOP: es el menu / la barra lateral IZQ...-->
<aside class="sidebar">
    <div class="sidebar-logo">Dashboard</div>
    <ul>
        <li>
            <a href="#" class="activo" id="activo">
                <i class="fa-solid fa-house"></i>
                <span>Inicio</span>
            </a>
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-folder-open"></i>
                <span>Reportes</span>
            </a>
        </li>
    </ul>
</aside>
<!-- CONTENIDO PRINCIAL (ctrl+})-->
<main>
    <!-- navigation -->
    <nav class="breadcrumb">
        <span>Inicio</span>
        <i class="fa-solid fa-chevron-right"></i>
        <span>Reportes</span>
    </nav>
    <div class="main-content">
        <p>AQUI VAMOS A ESCRIBIR EL CONTENIDO</p>
    </div>

<body>
<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🍽️</div>
      <h1>Restaurant<span>Pro</span></h1>
    </div>
    <h2>Bienvenido</h2>
    <p>Ingresa tus credenciales para acceder al sistema</p>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="Ej: carlos.lopez" value="admin">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" value="admin123">
    </div>
    <div class="form-group">
      <label>Rol</label>
      <select id="login-role">
        <option value="admin">Administrador</option>
        <option value="mozo">Mozo</option>
        <option value="cocina">Cocina</option>
      </select>
    </div>   
    <button class="btn-login" onclick="doLogin()">Ingresar al Sistema</button>
</div>

</body>
</html>
