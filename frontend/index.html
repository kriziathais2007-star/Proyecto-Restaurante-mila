<!DOCTYPE html>
<html lang="Es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante Milagros – Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<!-- login -->
<div class="login-intro" id="login-star">
<div class="login-left">
    <div class="login-logo">
        <div class="login-logo-circle">
            <img src="images/logo.png" alt="Logo" radius="100%">
        </div>
        <p class="login-brand">Restaurante Milagros</p>
    </div>
</div>
<div class="login-right">
    <div class="login-box">
        <div class="login-avatar"><i class="fa-solid fa-user"></i></div>
        <h2 class="login-title">INICIAR SESIÓN</h2>
        <div class="login-field">
            <label>USUARIO</label>
            <input type="text" id="inputUser" placeholder="Tu usuario" autocomplete="off">  
        </div>
        <div class="login-field">
            <label>CONTRASEÑA</label>
            <input type="password" id="inputPass" placeholder="•••••">
        </div>
        <button class="btn-ingresar" id="btnLogin">INGRESAR</button>
        <p class="login-error" id="loginError"></p>
        </div>
    </div>
</div>
<!-- ===== DASHBOARD ===== -->
<!-- topbar mobile-->
<div class="topbar">
    <div class="title-business">
      <i class="fa-solid fa-utensils" style="color:#c0392b;margin-right:8px"></i>
        <span>Restaurante Milagros</span>
    </div>
    <button class="hamburger" id="btnHamburger">
      <i class="fa-solid fa-bars"></i>
    </button>
</div>
<!--overlay-->
<div class="overlay" id="overlay"></div>
<!--sidebar-->
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-utensils"></i>
        <span>Milagros</span>
    </div>
<ul>
<li>
    <a href="#" class="nav-link activo" data-section="inicio">
        <i class="fa-solid fa-house"></i><span>Inicio</span>
    </a>
</li>
<li>
    <a href="#" class="nav-link" data-section="pedidos">
        <i class="fa-solid fa-clipboard-list"></i><span>Pedidos</span>
    </a>
</li>
<li>
    <a href="#" class="nav-link" data-section="cocina">
        <i class="fa-solid fa-kitchen-set"></i><span>Cocina</span>
    </a>
</li>
<li>
    <a href="#" class="nav-link" data-section="asistencia">
        <i class="fa-solid fa-user-check"></i><span>Asistencia</span>
    </a>
</li>
<li>
    <a href="#" class="nav-link" data-section="menu">
        <i class="fa-solid fa-pen-to-square"></i><span>Menú</span>
    </a>
</li>
</ul>
</div class="sidebar-footer">
    <a href="#" id="btnLogout" class="nav-link">
       <i class="fa-solid fa-right-from-bracket"></i><span>Cerrar sesión</span>
    </a>
</div>
</body>
</html>
