
<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-left">
    <div class="login-logo-wrap">
      <div class="login-logo-circle">
        <img src="image/logo.png">
      </div>
      <p class="login-brand">Restaurante<br><strong>Milagros</strong></p>
    </div>
  </div>
  <div class="login-right">
    <div class="login-box">
      <div class="login-avatar"><i class="fa-solid fa-user"></i></div>
      <h2 class="login-title">INICIAR SESIÓN</h2>
      <div class="login-field">
        <label>USUARIO:</label>
        <input type="text" id="inputUser" placeholder="Tu usuario" autocomplete="off">
      </div>
      <div class="login-field">
        <label>CONTRASEÑA:</label>
        <input type="password" id="inputPass" placeholder="••••••••">
      </div>
    </div>
  </div>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>Restaurante "Milagros"</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="#" class="activo" data-page="home">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                 <a href="#" class="nav-link" data-section="pedidos">
                    <i class="fa-solid fa-clipboard-list"></i><span>Pedidos</span>
                 </a>
            </li>
            <li>
                 <a href="#" class="nav-link" data-section="cocina">
                    <i class="fa-solid fa-kitchen-set"></i><span>Cocina</span>
                 </a>
            </li>
            <li>
                 <a href="#" class="nav-link" data-section="asistencia">
                    <i class="fa-solid fa-user-check"></i><span>Asistencia</span>
                 </a>
            </li>
            <li>
                 <a href="#" class="nav-link" data-section="menu">
                   <i class="fa-solid fa-pen-to-square"></i><span>Menú</span>
                 </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
   

  <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</div>
</html>
